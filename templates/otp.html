<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#edf2ff,#dbe7ff,#eaf1ff);
}

/* card */
.card{
    width:100%;
    max-width:430px;
    background:#ffffff;
    border-radius:28px;
    padding:42px 34px;
    box-shadow:
    0 20px 50px rgba(80,110,255,.12),
    0 6px 14px rgba(0,0,0,.04);
    animation:fadeUp .6s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card h2{
    font-size:34px;
    color:#13254b;
    font-weight:800;
    margin-bottom:14px;
    line-height:1.2;
    text-align:center;
}

.card h2::before{
    content:"SECURITY CHECK";
    display:block;
    font-size:12px;
    letter-spacing:4px;
    color:#4f6cff;
    font-weight:700;
    margin-bottom:14px;
}

.info{
    text-align:center;
    color:#6f7da8;
    font-size:15px;
    margin-bottom:22px;
    line-height:1.6;
}

.info b{
    color:#13254b;
}

/* input */
.group{
    position:relative;
    margin-bottom:22px;
}

.group input{
    width:100%;
    height:60px;
    border:1px solid #dbe4ff;
    border-radius:18px;
    background:#fff;
    padding:0 18px;
    font-size:18px;
    color:#1e2d59;
    outline:none;
    transition:.25s;
    text-align:center;
    letter-spacing:8px;
    font-weight:700;
}

.group input:focus{
    border-color:#4f6cff;
    box-shadow:0 0 0 4px rgba(79,108,255,.08);
}

.group label{
    position:absolute;
    left:18px;
    top:18px;
    color:#6f7da8;
    font-size:15px;
    pointer-events:none;
    transition:.25s;
}

.group input:focus + label,
.group input:not(:placeholder-shown) + label{
    top:-9px;
    left:14px;
    background:#fff;
    padding:0 8px;
    font-size:12px;
    color:#4f6cff;
    font-weight:700;
}

.group input::placeholder{
    color:transparent;
}

/* button */
button{
    width:100%;
    height:58px;
    border:none;
    border-radius:18px;
    margin-top:6px;
    background:linear-gradient(135deg,#4f6cff,#6d7cff);
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 14px 25px rgba(79,108,255,.22);
}

button:hover{
    transform:translateY(-2px);
}

button:active{
    transform:scale(.98);
}

/* error */
.error{
    background:#ffe8e8;
    color:#d92323;
    border:1px solid #ffd0d0;
    padding:13px 15px;
    border-radius:14px;
    margin-bottom:18px;
    font-size:14px;
    text-align:center;
}

@media(max-width:480px){

    body{
        padding:10px;
        align-items:flex-start;
        padding-top:30px;
    }

    .card{
        max-width:100%;
        width:100%;
        padding:28px 18px;
        border-radius:20px;
    }

    .card h2{
        font-size:26px;
    }

    .info{
        font-size:14px;
    }

    .group input,
    button{
        height:52px;
        border-radius:14px;
        font-size:16px;
    }

}
</style>
</head>

<body>

<div class="card">

    <h2>OTP Verification</h2>

    <p class="info">
        OTP sent to <b>{{ email }}</b>
    </p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.verify_otp', email=email) }}">

        <div class="group">
            <input type="text" name="otp" maxlength="6" required placeholder=" ">
            <label>Enter OTP</label>
        </div>

        <button type="submit">Verify</button>

    </form>

</div>

</body>
</html>
