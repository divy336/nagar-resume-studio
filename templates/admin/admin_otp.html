<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin OTP Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:"Segoe UI",sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4a6cf7,#6f8bff);
        }

        .card{
            width:380px;
            background:#fff;
            padding:32px;
            border-radius:16px;
            box-shadow:0 25px 50px rgba(0,0,0,0.2);
            animation:fadeIn .6s ease;
        }

        @keyframes fadeIn{
            from{opacity:0; transform:translateY(20px);}
            to{opacity:1; transform:translateY(0);}
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            color:#333;
        }

        p.subtitle{
            text-align:center;
            font-size:13px;
            color:#777;
            margin-bottom:24px;
        }

        .otp-input{
            width:100%;
            padding:14px;
            border:2px solid #dbe1ff;
            border-radius:10px;
            font-size:18px;
            letter-spacing:6px;
            text-align:center;
            outline:none;
            transition:.3s;
        }

        .otp-input:focus{
            border-color:#4a6cf7;
            box-shadow:0 0 0 3px rgba(74,108,247,0.15);
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#4a6cf7,#6f8bff);
            color:#fff;
            font-size:15px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(0,0,0,0.2);
        }

        .error{
            background:#ffe5e5;
            color:#c0392b;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
            text-align:center;
        }

        @media(max-width:420px){
            .card{width:90%;}
        }
    </style>
</head>
<body>

<div class="card">
    <h2>OTP Verification</h2>
    <p class="subtitle">Enter the 6-digit code sent to your email</p>

    {% if error %}
        <div class="error" id="errorBox">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{url_for("admin.admin_otp")}}">
        <input type="text" name="otp" maxlength="6" class="otp-input" placeholder="------" required>
        <button type="submit">Verify OTP</button>
    </form>
</div>
<script>
    const errorBox = document.getElementById("errorBox");

    if (errorBox) {
        setTimeout(() => {
            errorBox.style.opacity = "0";
            errorBox.style.transition = "opacity 0.5s ease";

            setTimeout(() => {
                errorBox.remove();
            }, 500);
        }, 2000); // 2 seconds
    }
</script>

</body>
</html>
