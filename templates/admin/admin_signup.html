<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Signup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif;}
:root{
--primary:#2563eb;
--primary-dark:#1d4ed8;
--bg:#eff6ff;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#dbeafe;
--danger-bg:#fef2f2;
--danger:#dc2626;
}
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
background:linear-gradient(135deg,#eff6ff,#dbeafe,#bfdbfe);
}
.card{
width:100%;
max-width:420px;
background:var(--card);
padding:34px;
border-radius:22px;
box-shadow:0 25px 60px rgba(37,99,235,.15);
animation:fade .5s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
h2{
text-align:center;
font-size:30px;
color:var(--text);
margin-bottom:8px;
}
.sub{
text-align:center;
color:var(--muted);
font-size:14px;
margin-bottom:24px;
}
.error{
background:var(--danger-bg);
color:var(--danger);
padding:12px;
border-radius:10px;
margin-bottom:16px;
text-align:center;
font-size:14px;
}
.group{position:relative;margin-bottom:18px;}
.group input{
width:100%;
padding:16px 14px;
border:1px solid var(--border);
border-radius:12px;
outline:none;
font-size:15px;
transition:.25s;
background:#fff;
}
.group input:focus{
border-color:var(--primary);
box-shadow:0 0 0 4px rgba(37,99,235,.10);
}
.group label{
position:absolute;
left:14px;
top:15px;
background:#fff;
padding:0 6px;
font-size:14px;
color:#94a3b8;
pointer-events:none;
transition:.25s;
}
.group input:focus+label,
.group input:not(:placeholder-shown)+label{
top:-8px;
font-size:12px;
color:var(--primary);
}
.group input::placeholder{color:transparent;}
button{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,var(--primary),var(--primary-dark));
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.25s;
margin-top:6px;
}
button:hover{transform:translateY(-2px);box-shadow:0 14px 25px rgba(37,99,235,.22)}
.link{
text-align:center;
margin-top:20px;
font-size:14px;
color:var(--muted);
}
.link a{
color:var(--primary);
text-decoration:none;
font-weight:600;
}
.link a:hover{text-decoration:underline;}
.brand{
text-align:center;
margin-top:18px;
font-size:13px;
color:#94a3b8;
}
@media(max-width:480px){
.card{padding:24px;border-radius:18px;}
h2{font-size:26px;}
}
</style>
</head>
<body>
<div class="card">
<h2>Admin Signup</h2>
<div class="sub">Create secure admin account</div>
{% if error %}
<div class="error" id="errorBox">{{ error }}</div>
{% endif %}
<form method="POST" action="{{ url_for('admin.admin_signup') }}">
<div class="group">
<input type="text" name="username" required placeholder=" ">
<label>Username</label>
</div>
<div class="group">
<input type="email" name="email" required placeholder=" ">
<label>Email</label>
</div>
<div class="group">
<input type="password" name="password" required placeholder=" ">
<label>Password</label>
</div>
<div class="group">
<input type="password" name="confirm" required placeholder=" ">
<label>Confirm Password</label>
</div>
<button type="submit">Create Admin Account</button>
</form>
<div class="link">Already have an account? <a href="{{ url_for('admin.admin_login') }}">Login</a></div>
<div class="brand">Made by Nagar's</div>
</div>
<script>
const errorBox=document.getElementById('errorBox');
if(errorBox){setTimeout(()=>{errorBox.style.opacity='0';setTimeout(()=>errorBox.remove(),500)},2000)}
</script>
</body>
</html>
