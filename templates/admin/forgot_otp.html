<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Sent</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:16px;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#eef3ff,#dbe7ff,#f5f8ff);
}

.card{
    width:100%;
    max-width:460px;
    background:#fff;
    border-radius:26px;
    padding:38px 28px;
    box-shadow:
    0 18px 45px rgba(79,108,255,.12),
    0 6px 14px rgba(0,0,0,.05);
    text-align:center;
    animation:fadeUp .6s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.icon{
    width:78px;
    height:78px;
    margin:auto;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    background:linear-gradient(135deg,#4f6cff,#6d7cff);
    color:#fff;
    box-shadow:0 12px 24px rgba(79,108,255,.25);
    margin-bottom:20px;
}

h2{
    font-size:30px;
    color:#13254b;
    margin-bottom:10px;
    font-weight:800;
}

p{
    font-size:15px;
    color:#6f7da8;
    line-height:1.7;
    margin-bottom:24px;
}

p b{
    color:#13254b;
}

.btn{
    display:inline-block;
    width:100%;
    text-decoration:none;
    padding:16px;
    border-radius:16px;
    background:linear-gradient(135deg,#4f6cff,#6d7cff);
    color:#fff;
    font-size:16px;
    font-weight:700;
    transition:.25s;
    box-shadow:0 14px 25px rgba(79,108,255,.22);
}

.btn:hover{
    transform:translateY(-2px);
}

.small{
    margin-top:18px;
    font-size:13px;
    color:#8a95b6;
}

@media(max-width:480px){

    body{
        align-items:flex-start;
        padding-top:28px;
    }

    .card{
        padding:30px 18px;
        border-radius:22px;
    }

    h2{
        font-size:26px;
    }

    .icon{
        width:70px;
        height:70px;
        font-size:32px;
    }

    .btn{
        padding:14px;
        border-radius:14px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="icon">✓</div>

    <h2>OTP Sent</h2>

    <p>
        Verification code has been sent to<br>
        <b>{{ email }}</b>
    </p>

    <a href="{{ url_for('auth.verify_otp', email=email) }}" class="btn">
        Verify OTP
    </a>

    <div class="small">
        Please check inbox / spam folder
    </div>

</div>

</body>
</html>
