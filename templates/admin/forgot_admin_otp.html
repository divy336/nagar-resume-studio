<!DOCTYPE html>
<html>
<head>
    <title>OTP Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4a6cf7,#6f8bff);
            font-family:Segoe UI;
        }
        .card{
            width:360px;
            background:#fff;
            padding:30px;
            border-radius:14px;
            box-shadow:0 20px 40px rgba(0,0,0,.2);
        }
        h2{text-align:center;margin-bottom:10px;}
        p{text-align:center;color:#666;margin-bottom:20px;}
        input{
            width:100%;
            padding:14px;
            font-size:18px;
            text-align:center;
            letter-spacing:6px;
            border-radius:8px;
            border:1px solid #ccc;
        }
        button{
            width:100%;
            margin-top:15px;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4a6cf7;
            color:#fff;
            font-size:15px;
            cursor:pointer;
        }
        .error{
            background:#ffe5e5;
            color:#c0392b;
            padding:8px;
            border-radius:6px;
            margin-bottom:10px;
            text-align:center;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>OTP Verification</h2>
    <p>Enter the OTP sent to your email</p>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{url_for("admin.forgot_admin_otp")}}">
        <input name="otp" maxlength="6" placeholder="------" required>
        <button type="submit">Verify OTP</button>
    </form>
</div>

</body>
</html>
