<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password - Admin</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
    background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

.card{
    width:100%;
    max-width:450px;
    background:#fff;
    padding:40px 30px;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo-icon{
    width:70px;
    height:70px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 15px;
    font-size:32px;
}

h2{
    text-align:center;
    font-size:28px;
    color:#1e293b;
    margin-bottom:8px;
    font-weight:700;
}

.subtitle{
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.5;
}

.input-box{
    margin-bottom:20px;
    position:relative;
}

.input-box label{
    display:block;
    color:#475569;
    font-size:14px;
    font-weight:600;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    height:52px;
    border:2px solid #e2e8f0;
    border-radius:12px;
    padding:0 18px;
    font-size:15px;
    outline:none;
    transition:all 0.3s;
    background:#f8fafc;
}

.input-box input:focus{
    border-color:#667eea;
    background:#fff;
    box-shadow:0 0 0 4px rgba(102,126,234,0.1);
}

.password-hint{
    font-size:12px;
    color:#94a3b8;
    margin-top:6px;
}

button{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:10px;
    transition:transform 0.2s,box-shadow 0.2s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(102,126,234,0.4);
}

button:active{
    transform:translateY(0);
}

.error{
    background:#fee2e2;
    color:#dc2626;
    padding:14px 16px;
    border-radius:12px;
    font-size:14px;
    text-align:center;
    margin-bottom:20px;
    border-left:4px solid #dc2626;
    animation:shake 0.3s;
}

.success{
    background:#dcfce7;
    color:#15803d;
    padding:14px 16px;
    border-radius:12px;
    font-size:14px;
    text-align:center;
    margin-bottom:20px;
    border-left:4px solid #16a34a;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.success-icon{
    width:20px;
    height:20px;
    background:#16a34a;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:12px;
    flex-shrink:0;
}

.back-link{
    text-align:center;
    margin-top:20px;
}

.back-link a{
    color:#667eea;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    transition:color 0.3s;
}

.back-link a:hover{
    color:#764ba2;
}

@keyframes shake{
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-10px)}
    75%{transform:translateX(10px)}
}

/* Mobile Optimizations */
@media(max-width:480px){
    body{
        padding:10px;
    }

    .card{
        padding:30px 20px;
        border-radius:16px;
        box-shadow:0 10px 40px rgba(0,0,0,0.2);
    }

    .logo-icon{
        width:60px;
        height:60px;
        font-size:28px;
        margin-bottom:12px;
    }

    h2{
        font-size:24px;
    }

    .subtitle{
        font-size:13px;
        margin-bottom:25px;
    }

    .input-box{
        margin-bottom:16px;
    }

    .input-box input{
        height:48px;
        font-size:14px;
        padding:0 14px;
    }

    button{
        height:48px;
        font-size:15px;
    }

    .error,.success{
        font-size:13px;
        padding:12px 14px;
    }
}

/* Extra small phones */
@media(max-width:360px){
    .card{
        padding:25px 16px;
    }

    h2{
        font-size:22px;
    }

    .input-box input{
        height:46px;
        font-size:13px;
    }

    button{
        height:46px;
        font-size:14px;
    }
}

/* Landscape mobile */
@media(max-height:500px) and (orientation:landscape){
    body{
        padding:10px;
    }

    .card{
        padding:20px;
        max-width:500px;
    }

    .logo{
        margin-bottom:15px;
    }

    .logo-icon{
        width:50px;
        height:50px;
        font-size:24px;
        margin-bottom:8px;
    }

    h2{
        font-size:20px;
        margin-bottom:5px;
    }

    .subtitle{
        font-size:12px;
        margin-bottom:15px;
    }

    .input-box{
        margin-bottom:12px;
    }

    .input-box input{
        height:42px;
    }

    button{
        height:42px;
        margin-top:5px;
    }
}
</style>
</head>
<body>
<div class="card">
<div class="logo">
    <div class="logo-icon">🔒</div>
</div>

<h2>Reset Password</h2>
<p class="subtitle">Create a new password for your admin account</p>

{% if error %}
<div class="error">⚠️ {{ error }}</div>
{% endif %}

{% if success %}
<div class="success">
    <div class="success-icon">✓</div>
    <span>{{ success }}</span>
</div>
{% endif %}

<form method="POST" action="{{ url_for('admin.reset_password') }}" id="resetForm">

    <div class="input-box">
        <label for="new_password">New Password</label>
        <input 
            type="password" 
            id="new_password"
            name="new_password" 
            placeholder="Enter new password"
            minlength="6"
            required
        >
        <div class="password-hint">Minimum 6 characters</div>
    </div>

    <div class="input-box">
        <label for="confirm_password">Confirm Password</label>
        <input 
            type="password" 
            id="confirm_password"
            name="confirm_password" 
            placeholder="Confirm new password"
            minlength="6"
            required
        >
    </div>

    <button type="submit" id="submitBtn">Update Password</button>

</form>

<div class="back-link">
    <a href="{{ url_for('admin.admin_login') }}">← Back to Login</a>
</div>
</div>
<script>
// Form validation
document.getElementById('resetForm').addEventListener('submit', function(e) {
    const newPass = document.getElementById('new_password').value;
    const confirmPass = document.getElementById('confirm_password').value;
    const btn = document.getElementById('submitBtn');

    if (newPass.length < 6) {
        e.preventDefault();
        alert('Password must be at least 6 characters long');
        return false;
    }

    if (newPass !== confirmPass) {
        e.preventDefault();
        alert('Passwords do not match!');
        return false;
    }

    // Disable button to prevent double submission
    btn.disabled = true;
    btn.textContent = 'Updating...';
});

{% if success %}
// Redirect to admin login after success
setTimeout(function(){
    window.location.href = "{{ url_for('admin.admin_login') }}";
}, 1500);
{% endif %}
</script>
</body>
</html>
