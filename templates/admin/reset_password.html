<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Reset Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:Segoe UI,sans-serif;
    background:linear-gradient(135deg,#eef2ff,#dbeafe,#f8fafc);
}

.card{
    width:100%;
    max-width:430px;
    background:#fff;
    padding:38px 28px;
    border-radius:24px;
    box-shadow:0 20px 50px rgba(0,0,0,.08);
}

h2{
    text-align:center;
    font-size:30px;
    color:#1e293b;
    margin-bottom:8px;
}

p{
    text-align:center;
    color:#64748b;
    font-size:14px;
    margin-bottom:25px;
}

.input-box{
    margin-bottom:18px;
}

input{
    width:100%;
    height:54px;
    border:1px solid #dbeafe;
    border-radius:14px;
    padding:0 16px;
    font-size:15px;
    outline:none;
}

input:focus{
    border-color:#4f46e5;
}

button{
    width:100%;
    height:54px;
    border:none;
    border-radius:14px;
    background:#4f46e5;
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    margin-top:8px;
}

button:hover{
    opacity:.95;
}

.error{
    background:#fee2e2;
    color:#dc2626;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    text-align:center;
    margin-bottom:15px;
}

.success{
    background:#dcfce7;
    color:#15803d;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    text-align:center;
    margin-bottom:15px;
}

@media(max-width:480px){

.card{
    padding:30px 20px;
    border-radius:18px;
}

h2{
    font-size:26px;
}

}
</style>
</head>

<body>

<div class="card">

<h2>Reset Password</h2>
<p>Create new password for admin account</p>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if success %}
<div class="success">{{ success }}</div>
{% endif %}

<form method="POST">

<div class="input-box">
<input type="password" name="new_password" placeholder="New Password" required>
</div>

<div class="input-box">
<input type="password" name="confirm_password" placeholder="Confirm Password" required>
</div>

<button type="submit">Update Password</button>

</form>

</div>

{% if redirect_login %}
<script>
setTimeout(function(){
    window.location.href="/admin_login";
},2000);
</script>
{% endif %}

</body>
</html>
