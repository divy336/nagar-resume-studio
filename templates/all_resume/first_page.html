<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Info</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  overflow-x:hidden;
  font-family:'Poppins',sans-serif;
  background:#f1f5f9;
}

/* ===== BODY ===== */
body{
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:20px;
  min-height:100vh;
}

/* ===== CARD ===== */
.card{
  width:100%;
  max-width:650px;
  background:#fff;
  border-radius:16px;
  padding:28px 24px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* ===== TITLE ===== */
h2{
  text-align:center;
  color:#2563eb;
  font-size:28px;
  margin-bottom:22px;
}

/* ===== STEP NAV ===== */
.step-nav{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:10px;
  overflow-x:auto;
  overflow-y:hidden;
  padding-bottom:10px;
  margin-bottom:25px;
  scrollbar-width:none;
}

.step-nav::-webkit-scrollbar{
  display:none;
}

.step{
  text-align:center;
  cursor:pointer;
  min-width:65px;
  flex-shrink:0;
}

.step span{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  font-weight:700;
  transition:.3s;
}

.step.active span{
  background:#2563eb;
  color:#fff;
}

.step p{
  font-size:11px;
  margin-top:6px;
  white-space:nowrap;
}

.line{
  width:28px;
  height:3px;
  background:#e5e7eb;
  flex-shrink:0;
}

/* ===== FORM ===== */
.form-group{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:14px;
  margin-bottom:7px;
  font-weight:500;
  color:#1e293b;
}

input,
select,
textarea{
  width:100%;
  padding:12px 14px;
  border:1px solid #d1d5db;
  border-radius:10px;
  font-size:14px;
  outline:none;
  transition:.2s;
  background:#fff;
}

input:focus,
select:focus,
textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

textarea{
  resize:none;
}

/* ===== LINKEDIN ===== */
.linkedin-wrapper{
  display:flex;
  border:1px solid #d1d5db;
  border-radius:10px;
  overflow:hidden;
}

.linkedin-prefix{
  background:#f8fafc;
  padding:12px;
  font-size:12px;
  color:#64748b;
  border-right:1px solid #e5e7eb;
  white-space:nowrap;
}

.linkedin-wrapper input{
  border:none;
  border-radius:0;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:13px;
  border:none;
  border-radius:10px;
  background:#2563eb;
  color:#fff;
  font-size:15px;
  cursor:pointer;
  margin-top:14px;
  transition:.2s;
}

button:hover{
  background:#1d4ed8;
}

/* ===== SUGGESTIONS ===== */
.suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
  max-height:120px;
  overflow-y:auto;
}

.suggestions::-webkit-scrollbar{
  width:6px;
}

.suggestions::-webkit-scrollbar-thumb{
  background:#2563eb;
  border-radius:8px;
}

.suggest-badge{
  background:#dbeafe;
  color:#2563eb;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  word-break:break-word;
}

.suggest-badge:hover{
  background:#2563eb;
  color:#fff;
}

.suggest-btn{
  width:auto;
  display:inline-block;
  padding:7px 14px;
  margin-top:10px;
  background:#eef2ff;
  color:#2563eb;
  font-size:13px;
}

.suggest-btn:hover{
  background:#2563eb;
  color:#fff;
}

/* ===== FEEDBACK ===== */
.feedback{
  font-size:13px;
  color:#2563eb;
  margin-top:6px;
}

#charCount{
  font-weight:600;
  color:#2563eb;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

body{
  padding:10px;
}

.card{
  padding:18px 14px;
  border-radius:12px;
}

h2{
  font-size:22px;
  margin-bottom:18px;
}

.step{
  min-width:58px;
}

.step span{
  width:32px;
  height:32px;
  font-size:13px;
}

.step p{
  font-size:10px;
}

.line{
  width:22px;
}

input,
select,
textarea,
button{
  padding:10px;
  font-size:14px;
}

.linkedin-wrapper{
  flex-direction:column;
}

.linkedin-prefix{
  border-right:none;
  border-bottom:1px solid #e5e7eb;
  padding:8px;
  font-size:11px;
}

.suggestions{
  max-height:90px;
}

.suggest-badge{
  font-size:11px;
  padding:5px 8px;
}

}
</style>
</head>

<body> 

<div class="card">
    <h2>Basic Information</h2>
<div class="step-nav">
  <div class="step" onclick="goDashboard()">
        <span>🏠</span>
        <p>Dashboard     </p>
    </div>
        <div class="line"></div>


    <div class="step {{ 'active' if current_step == 1 else '' }}" onclick="goStep(1)">
        <span>1</span><p>Basic</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 2 else '' }}" onclick="goStep(2)">
        <span>2</span><p>Details</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 3 else '' }}" onclick="goStep(3)">
        <span>3</span><p>Education</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 4 else '' }}" onclick="goStep(4)">
        <span>4</span><p>Upload</p>
    </div>


    <!-- Optional: disable click on current step -->
   
</div>


<form method="POST">
<input type="hidden" name="next_step" id="nextStep">

<div class="form-group">
<label>Choose Career *</label>
<select id="career" name="career" required>

    <option value="" {% if not resume.get('career') %}selected{% endif %}>
        Select
    </option>

    <option value="Business"
        {% if resume.get('career') == 'Business' %}selected{% endif %}>
        Business (BBA / MBA / B.Com / M.Com)
    </option>

    <option value="Design"
        {% if resume.get('career') == 'Design' %}selected{% endif %}>
        Design (UI/UX, Graphic, Web, Product, Visual)
    </option>

    <option value="Finance"
        {% if resume.get('career') == 'Finance' %}selected{% endif %}>
        Finance (Accounting, Banking, Analyst, Taxation, Audit)
    </option>

    <option value="Other"
        {% if resume.get('career') == 'Other' %}selected{% endif %}>
        Other (General, Support, Operations, Admin, Other)
        
    </option>

</select>

<div id="careerFeedback" class="feedback"></div>
</div>
<label>Enter Your Field</label>
<input type="text"
       name="field_name"
       placeholder="Teacher / Chef / Designer"
       value="{{ resume.field_name or '' }}">

<div class="form-group">
<label>Name</label>
<input type="text" name="name"  value="{{ resume.get('name','') }}" placeholder="Full name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email"  name="email" value="{{ resume.get('email','') }}" >
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone" name="phone" value="{{ resume.get('phone','') }}" placeholder="10-digit number">
</div>
<div class="form-group">
    <label>Address</label>
    <input type="text" name="address" placeholder="City, State" value="{{ resume.get('address','') }}">
</div>
<div class="form-group">
    <label>LinkedIn (Optional)</label>
    <div class="linkedin-wrapper">
        <span class="linkedin-prefix">https://linkedin.com/in/</span>
        <input type="text" name="linkedin" placeholder="your-username" value="{{ resume.get('linkedin','') }}">
    </div>
</div>
<div class="form-group">
<label>Objective</label>
<textarea id="objective" name="objective" rows="3" >{{ resume.get('objective','') }}</textarea>


<div>
    Characters: <span id="charCount">0</span> / 180
</div>
<button type="button" id="toggleSuggestions" class="suggest-btn">
    Show Suggestions
</button>

<div id="objectiveSuggestions" class="suggestions" style="display:none;"></div>

<button type="submit">Save</button>
</div>
</form>
</div>

<script>

function toggleOtherField() {
    let career = document.getElementById("career").value;
    let box = document.getElementById("otherBox");

    if(career === "Other"){
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

window.onload = toggleOtherField;



    function goDashboard() {
    window.location.href = "/dashbord";
}

function goStep(step) {

    let form = document.querySelector("form");

    if(form){
        document.getElementById("nextStep").value = step;
        form.submit(); // 🔥 submit current page form
    } else {
        redirectStep(step);
    }
}

function redirectStep(step){
    const routes = {
        1: "/first_page",
        2: "/second_page",
        3: "/third_page",
        4: "/forth_page",
        5: "/fifth_page"
    };

    window.location.href = routes[step];
}

const careerSelect = document.getElementById("career");
const suggestionBox = document.getElementById("objectiveSuggestions");
const objectiveField = document.getElementById("objective");
const feedback = document.getElementById("careerFeedback");
const toggleBtn = document.getElementById("toggleSuggestions");
const nameInput = document.querySelector("input[name='name']");
const textarea = document.getElementById("objective");
const charCount = document.getElementById("charCount");

textarea.addEventListener("input", function () {
    let length = this.value.length;
    charCount.innerText = length;
});
let visible = false;



// 🔥 DATA MAP
const dataMap = {

        "[NAME] is eager to use problem-solving skills in the [FIELD] sector to contribute to success and improve efficiency.",
        "[NAME] aims to grow professionally in the [FIELD] domain by contributing innovative ideas and effective planning skills.",
        "[NAME] is a goal-oriented professional seeking to enhance processes in the [FIELD] field through leadership abilities.",
        "[NAME] is passionate about achieving success in the [FIELD] field through teamwork and effective communication.",
        "[NAME] aims to support growth in the [FIELD] sector by applying decision-making skills and leadership qualities.",
        "[NAME] is a motivated individual looking to contribute to development in the [FIELD] field through innovative thinking.",
        "[NAME] seeks to build a successful career in the [FIELD] field by applying management skills and supporting growth."
    ],
    Design: [
"[NAME] is a creative professional in the [FIELD] field focused on delivering visually engaging and user-friendly designs that enhance user experience and brand identity.",
"[NAME] aims to contribute innovative design thinking and creative skills in the [FIELD] domain to develop impactful visual solutions and improve user interaction.",
"[NAME] is passionate about creating intuitive and aesthetic designs in the [FIELD] field to enhance usability and deliver meaningful digital experiences.",
"[NAME] seeks to apply creative problem-solving and visual storytelling skills in the [FIELD] field to build engaging and user-centric design solutions.",
"[NAME] is a detail-oriented designer aiming to use creativity and innovation in the [FIELD] field to develop modern and functional design concepts.",
"[NAME] aims to utilize design thinking and creativity in the [FIELD] field to create visually appealing and user-focused digital experiences.",

       "[NAME] is a motivated professional seeking opportunities in the [FIELD] field to apply skills, gain experience, and contribute effectively to organizational growth.",
"[NAME] aims to build a strong career in the [FIELD] field by utilizing problem-solving and communication skills to support company success and development.",
"[NAME] is a dedicated individual looking to apply knowledge and skills in the [FIELD] field to contribute to organizational goals and improve performance.",

// 🔥 FUNCTION: GENERATE + SHOW SUGGESTIONS
function showSuggestions() {

    const selected = careerSelect.value;
    const name = nameInput.value || "Your Name";

    suggestionBox.innerHTML = "";

    if (!dataMap[selected]) return;

    dataMap[selected].forEach(text => {

        const finalText = text
            .replace("[NAME]", name)
            .replace("[FIELD]", selected);

        const span = document.createElement("span");
        span.className = "suggest-badge";
        span.innerText = finalText;

        span.onclick = () => {
            objectiveField.value = finalText;
                objectiveField.dispatchEvent(new Event("input"));

        };

        suggestionBox.appendChild(span);
    });
}

// 🔥 TOGGLE BUTTON
toggleBtn.addEventListener("click", () => {

    visible = !visible;

    if (visible) {
        suggestionBox.style.display = "flex";
        toggleBtn.innerText = "Hide Suggestions";
        showSuggestions();
    } else {
        suggestionBox.style.display = "none";
        toggleBtn.innerText = "Show Suggestions";
    }
});

// 🔥 CAREER CHANGE
careerSelect.addEventListener("change", () => {
    const selected = careerSelect.value;
    feedback.innerText = "Selected: " + selected;

    if (visible) showSuggestions();
});

// 🔥 NAME LIVE UPDATE
nameInput.addEventListener("input", () => {
    if (visible) showSuggestions();
});

// 🔥 PHONE VALIDATION
document.querySelector("form").onsubmit = function() {
    const phone = document.getElementById("phone").value;
    if (!/^\d{10}$/.test(phone)) {
        alert("Enter valid 10-digit phone");
        return false;
    }
};

</script>

</body>
</html>
