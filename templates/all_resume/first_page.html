<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Info</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --bg: #f1f5f9;
}

* { box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 30px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 600px;
}

h2 { text-align: center; color: var(--primary); }

.form-group { margin-bottom: 15px; }

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

textarea { resize: none; }

button {
    width: 100%;
    background: var(--primary);
    color: white;
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover { background: #1d4ed8; }

/* Suggestions */
.suggestions {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.suggest-badge {
    background: var(--primary-light);
    color: var(--primary);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
}

.suggest-badge:hover {
    background: var(--primary);
    color: white;
}

.feedback {
    font-size: 13px;
    color: var(--primary);
    margin-top: 5px;
}
.suggestions {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;

    max-height: 120px;   /* 🔥 control height */
    overflow-y: auto;    /* 🔥 enable scroll */
    padding-right: 5px;
}

/* Optional scrollbar styling */
.suggestions::-webkit-scrollbar {
    width: 6px;
}

.suggestions::-webkit-scrollbar-thumb {
    background: #2563eb;
    border-radius: 10px;
}
.suggestions {
    display: block;
}
@media (max-width: 600px) {

    .suggestions {
        max-height: 100px;   /* 🔽 smaller height */
        overflow-y: auto;
        gap: 5px;
    }

    .suggest-badge {
        font-size: 11px;     /* 🔽 smaller text */
        padding: 4px 8px;    /* 🔽 compact */
        max-width: 140px;    /* 🔥 prevent big width */
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
}
  /* keep single line */
.suggest-badge {
    background: #eef2ff;
    color: #2563eb;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;

    /* 🔥 IMPORTANT FIX */
    white-space: normal;     /* allow next line */
    word-break: break-word;  /* break long words */
    max-width: 100%;
}

.suggest-badge:hover {
    background: #2563eb;
    color: #fff;
}
.suggest-btn {
    background: #eef2ff;
    color: #2563eb;
    border: none;
    padding: 5px 10px;      /* 🔽 smaller */
    border-radius: 6px;
    font-size: 12px;        /* 🔽 smaller text */
    cursor: pointer;
    margin-top: 8px;
    display: inline-block;  /* 🔥 prevent full width */
    width: auto;            /* 🔥 auto size */
    transition: all 0.2s ease;
}

.suggest-btn:hover {
    background: #2563eb;
   
    color: white;
}
.linkedin-wrapper {
    display: flex;
    align-items: center;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    background: #f8fafc;
}

.linkedin-prefix {
    padding: 0 10px;
    font-size: 12px;
    color: #64748b;
    background: #f1f5f9;
    border-right: 1px solid #e2e8f0;
    height: 40px;
    display: flex;
    align-items: center;
}

.linkedin-wrapper input {
    border: none;
    outline: none;
    padding: 10px;
    flex: 1;
    background: transparent;
}





.step-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
}

.step {
    text-align: center;
    cursor: pointer;
}

.step span {
    display: flex;
    width: 35px;
    height: 35px;
    background: #e5e7eb;
    border-radius: 50%;
    align-items: center;
    justify-content: center;
    margin: auto;
    font-weight: bold;
    transition: 0.3s;
}

.step.active span {
    background: #3b82f6;
    color: white;
}

.step p {
    font-size: 12px;
    margin-top: 5px;
}

.line {
    width: 50px;
    height: 3px;
    background: #e5e7eb;
}
</style>
</head>

<body> 

<div class="card">
    <h2>Basic Information</h2>
<div class="step-nav">
  <div class="step" onclick="goDashboard()">
        <span>🏠</span>
        <p>Dashboard     </p>
    </div>
        <div class="line"></div>


    <div class="step {{ 'active' if current_step == 1 else '' }}" onclick="goStep(1)">
        <span>1</span><p>Basic</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 2 else '' }}" onclick="goStep(2)">
        <span>2</span><p>Details</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 3 else '' }}" onclick="goStep(3)">
        <span>3</span><p>Education</p>
    </div>

    <div class="line"></div>

    <div class="step {{ 'active' if current_step == 4 else '' }}" onclick="goStep(4)">
        <span>4</span><p>Upload</p>
    </div>


    <!-- Optional: disable click on current step -->
   
</div>


<form method="POST">
<input type="hidden" name="next_step" id="nextStep">

<div class="form-group">
<label>Choose Career *</label>
<select id="career" name="career" required>

    <option value="" {% if not resume.get('career') %}selected{% endif %}>
        Select
    </option>

    <option value="Business"
        {% if resume.get('career') == 'Business' %}selected{% endif %}>
        Business (BBA / MBA / B.Com / M.Com)
    </option>

    <option value="Design"
        {% if resume.get('career') == 'Design' %}selected{% endif %}>
        Design (UI/UX, Graphic, Web, Product, Visual)
    </option>

    <option value="Finance"
        {% if resume.get('career') == 'Finance' %}selected{% endif %}>
        Finance (Accounting, Banking, Analyst, Taxation, Audit)
    </option>

    <option value="Other"
        {% if resume.get('career') == 'Other' %}selected{% endif %}>
        Other (General, Support, Operations, Admin, Other)
        
    </option>

</select>

<div id="careerFeedback" class="feedback"></div>
</div>
<label>Enter Your Field</label>
<input type="text"
       name="field_name"
       placeholder="Teacher / Chef / Designer"
       value="{{ resume.field_name or '' }}">

<div class="form-group">
<label>Name</label>
<input type="text" name="name"  value="{{ resume.get('name','') }}" placeholder="Full name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email"  name="email" value="{{ resume.get('email','') }}" >
</div>

<div class="form-group">
<label>Phone</label>
<input type="text" id="phone" name="phone" value="{{ resume.get('phone','') }}" placeholder="10-digit number">
</div>
<div class="form-group">
    <label>Address</label>
    <input type="text" name="address" placeholder="City, State" value="{{ resume.get('address','') }}">
</div>
<div class="form-group">
    <label>LinkedIn (Optional)</label>
    <div class="linkedin-wrapper">
        <span class="linkedin-prefix">https://linkedin.com/in/</span>
        <input type="text" name="linkedin" placeholder="your-username" value="{{ resume.get('linkedin','') }}">
    </div>
</div>
<div class="form-group">
<label>Objective</label>
<textarea id="objective" name="objective" rows="3" >{{ resume.get('objective','') }}</textarea>


<div>
    Characters: <span id="charCount">0</span> / 180
</div>
<button type="button" id="toggleSuggestions" class="suggest-btn">
    Show Suggestions
</button>

<div id="objectiveSuggestions" class="suggestions" style="display:none;"></div>

<button type="submit">Save</button>
</div>
</form>
</div>

<script>

function toggleOtherField() {
    let career = document.getElementById("career").value;
    let box = document.getElementById("otherBox");

    if(career === "Other"){
        box.style.display = "block";
    } else {
        box.style.display = "none";
    }
}

window.onload = toggleOtherField;



    function goDashboard() {
    window.location.href = "/dashbord";
}

function goStep(step) {

    let form = document.querySelector("form");

    if(form){
        document.getElementById("nextStep").value = step;
        form.submit(); // 🔥 submit current page form
    } else {
        redirectStep(step);
    }
}

function redirectStep(step){
    const routes = {
        1: "/first_page",
        2: "/second_page",
        3: "/third_page",
        4: "/forth_page",
        5: "/fifth_page"
    };

    window.location.href = routes[step];
}

const careerSelect = document.getElementById("career");
const suggestionBox = document.getElementById("objectiveSuggestions");
const objectiveField = document.getElementById("objective");
const feedback = document.getElementById("careerFeedback");
const toggleBtn = document.getElementById("toggleSuggestions");
const nameInput = document.querySelector("input[name='name']");
const textarea = document.getElementById("objective");
const charCount = document.getElementById("charCount");

textarea.addEventListener("input", function () {
    let length = this.value.length;
    charCount.innerText = length;
});
let visible = false;



// 🔥 DATA MAP

    ],

"[NAME] is a creative professional in the [FIELD] field focused on delivering visually engaging and user-friendly designs that enhance user experience and brand identity.",
"[NAME] aims to contribute innovative design thinking and creative skills in the [FIELD] domain to develop impactful visual solutions and improve user interaction.",

// 🔥 FUNCTION: GENERATE + SHOW SUGGESTIONS
function showSuggestions() {

    const selected = careerSelect.value;
    const name = nameInput.value || "Your Name";

    suggestionBox.innerHTML = "";

    if (!dataMap[selected]) return;

    dataMap[selected].forEach(text => {

        const finalText = text
            .replace("[NAME]", name)
            .replace("[FIELD]", selected);

        const span = document.createElement("span");
        span.className = "suggest-badge";
        span.innerText = finalText;

        span.onclick = () => {
            objectiveField.value = finalText;
                objectiveField.dispatchEvent(new Event("input"));

        };

        suggestionBox.appendChild(span);
    });
}

// 🔥 TOGGLE BUTTON
toggleBtn.addEventListener("click", () => {

    visible = !visible;

    if (visible) {
        suggestionBox.style.display = "flex";
        toggleBtn.innerText = "Hide Suggestions";
        showSuggestions();
    } else {
        suggestionBox.style.display = "none";
        toggleBtn.innerText = "Show Suggestions";
    }
});

// 🔥 CAREER CHANGE
careerSelect.addEventListener("change", () => {
    const selected = careerSelect.value;
    feedback.innerText = "Selected: " + selected;

    if (visible) showSuggestions();
});

// 🔥 NAME LIVE UPDATE
nameInput.addEventListener("input", () => {
    if (visible) showSuggestions();
});

// 🔥 PHONE VALIDATION
document.querySelector("form").onsubmit = function() {
    const phone = document.getElementById("phone").value;
    if (!/^\d{10}$/.test(phone)) {
        alert("Enter valid 10-digit phone");
        return false;
    }
};

</script>

</body>
</html>
